version: '3.8'

services:
  voice-agent:
    build: .
    container_name: ryan-voice-ai
    restart: always
    ports:
      - "3018:3018"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3018
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3018/health"]
      interval: 30s
      timeout: 10s
      retries: 3
